<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ưu Đãi Dành Cho Ngành Giáo Dục và Chiết Khấu Cho Sinh Viên - Giáo Dục - Apple (VN)</title>
    <link rel="stylesheet" href="../css/button.css">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f7;
            padding: 40px;
        }
        .form-container {
            max-width: 720px;
            margin: auto;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid #1d1d1f;
            
        }
        fieldset {
            border: 1px solid #1d1d1f;
            margin-bottom: 20px;
            padding: 16px;
            border-radius: 5px;
        }
        legend {
            font-weight: bold;
            padding: 0 10px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background-color: #0066cc;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 100%;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <form action="../index.html" method="POST">
            <fieldset>
                <legend>Thông tin cá nhân</legend>
            
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" name="fullname" placeholder="" required>
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" name="phone" placeholder="" required>
                </div>
                <div class="form-group">
                    <label for="email">Địa chỉ Email</label>
                    <input type="email" id="email" name="email" placeholder="" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="" required>
                </div>
            </fieldset>
            
            <fieldset>
                <legend>Sản phẩm quan tâm</legend>
                <div class="form-group">
                    <label for="product">Chọn dòng sản phẩm</label>
                    <select id="product" name="product">
                        <option value="macbook">MacBook Air</option>
                        <option value="ipad">iPad</option>
                        <option value="iphone">iPhone</option>
                        <option value="watch">Apple Watch</option>
                        <option value="airpods">AirPods</option>
                        <option value="airtags">AirTags</option>
                        <option value="appletv">Apple TV 4K</option>
                        <option value="accessories">Phụ kiện</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Chọn số lượng</label>
                    <input type="number" id="quantity" name="quantity" min="1" max="10" value="1">
                </div>
            </fieldset>

            <fieldset>
                <legend>Dịch vụ & Ưu đãi</legend>
                <div class="form-group">
                    <label>Hình thức nhận hàng</label>
                    <div class="radio-group">
                        <label class="option-item">
                            <input type="radio" name="shipping" value="home" checked> Giao hàng tận nhà
                        </label>
                        <label class="option-item">
                            <input type="radio" name="shipping" value="store"> Nhận tại cửa hàng
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Ưu đãi đi kèm</label>
                    <div class="checkbox-group">
                        <label class="option-item">
                            <input type="checkbox" name="perks" value="apple-music" checked> 3 tháng Apple Music
                        </label>
                        <label class="option-item">
                            <input type="checkbox" name="perks" value="apple-tv"> 3 tháng Apple TV+
                        </label>
                        <label class="option-item">
                            <input type="checkbox" name="perks" value="icloud"> Miễn phí 50GB iCloud
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="proof">Tải lên thẻ sinh viên (nếu có)</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="proof" name="proof">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Ghi chú thêm</legend>
                <div class="form-group">
                    <label for="message"></label>
                    <textarea id="message" name="message" rows="4" cols="50" placeholder=""></textarea>
                </div>
            </fieldset>

            <input type="submit" value="Gửi thông tin" class="btn-submit">
        </form>
    </div>
</body>
</html>
